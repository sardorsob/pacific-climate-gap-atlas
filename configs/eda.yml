task: TASK-009
description: Script-first exploratory analysis sprint foundation.
inputs:
  dataset_profile: artifacts/tables/dataset_profile.csv
  geography_context: data/external/geography_context.csv
  geography_lookup: data/processed/geography_lookup.csv
  observations: data/processed/official_observations.csv
  gap_index: artifacts/tables/adaptation_gap_index.csv
  indicator_trace: artifacts/tables/adaptation_gap_indicator_trace.csv
  trend_diagnostics: artifacts/tables/climate_trend_diagnostics.csv
  outlook: artifacts/tables/adaptation_gap_outlook.csv
outputs:
  data_coverage: artifacts/tables/eda_data_coverage.csv
  coverage_by_geography: artifacts/tables/eda_coverage_by_geography.csv
  coverage_by_dataset: artifacts/tables/eda_coverage_by_dataset.csv
  indicator_forensics: artifacts/tables/eda_indicator_forensics.csv
  indicator_outliers: artifacts/tables/eda_indicator_outliers.csv
  country_drivers: artifacts/tables/eda_country_drivers.csv
  country_story_labels: artifacts/tables/eda_country_story_labels.csv
  spatial_typologies: artifacts/tables/eda_spatial_typologies.csv
  subregion_comparisons: artifacts/tables/eda_subregion_comparisons.csv
  index_sensitivity: artifacts/tables/index_sensitivity.csv
  rank_volatility: artifacts/tables/eda_rank_volatility.csv
  trend_profiles: artifacts/tables/eda_trend_profiles.csv
  outlook_interpretation: artifacts/tables/eda_outlook_interpretation.csv
  monitoring_gap: artifacts/tables/eda_monitoring_gap.csv
  summary: artifacts/provenance/eda_summary.json
caveats:
  - Descriptive EDA only; no causal claims.
  - Current geometry is centroid fallback, not polygon boundaries.
  - Monitoring counts are proxy coverage until normalized with external context.
  - Rank volatility is uncertainty framing, not a replacement ranking.
  - Coverage diagnostics describe official-data availability, not outcomes.
  - Indicator outliers are comparable only within the same dataset and unit.
  - Country story labels are descriptive screens, not causal explanations.
  - Spatial typologies are rule-based descriptors, not statistical clusters.
  - No centroid-distance or land-adjacency inference is used.
  - Outlook interpretation is stress-test display guidance, not forecasting.
  - Missing monitoring rows are reporting gaps, not confirmed infrastructure absence.
